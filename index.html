    box.innerHTML=`${logo}<h2>Waiting for approval</h2>
      <p>Your account <b>${escAttr(Store.user.email||"")}</b> is set up, but EuroScout access is granted by an editor. You'll be let in once you're approved \u2014 check back shortly.</p>
      <button class="btn ghost" id="agOut">Sign out</button>`;
    const o=$("#agOut"); if(o)o.onclick=async()=>{await Store.signOut();location.reload();};
    return;
  }
  const su=AG_MODE==="signup";
  box.innerHTML=`${logo}<h2>${su?"Create your account":"Sign in"}</h2>
    <p>EuroScout is private. ${su?"Create an account with a password \u2014 an editor then approves your access.":"Sign in with your email and password."}</p>
    <input id="agEmail" type="email" inputmode="email" placeholder="you@club.com" autocomplete="email"/>
    <input id="agPass" type="password" placeholder="Password${su?" (min 6 characters)":""}" autocomplete="${su?"new-password":"current-password"}"/>
    <button class="btn" id="agGo">${su?"Create account":"Sign in"}</button>
    <div class="agmsg" id="agMsg"></div>
    <div class="agswitch" id="agSwitch">${su?"\u2190 Already have an account? Sign in":"New here? Create an account \u2192"}</div>`;
  const go=$("#agGo"), em=$("#agEmail"), pass=$("#agPass"), msg=$("#agMsg");
  const submit=async()=>{const v=(em.value||"").trim(), p=pass.value||"";
    if(!v||!p){msg.textContent="Enter your email and password.";return;}
    go.disabled=true;
    if(su){msg.textContent="Creating account\u2026";
      try{const inNow=await Store.signUp(v,p);
        if(inNow){msg.textContent="Account created \u2014 signing you in\u2026";/* onAuthChange -> waiting screen */}
        else{msg.innerHTML="\u2713 Account created. If it doesn't sign you in, email confirmation is still on in Supabase \u2014 turn it off. Then sign in.";go.disabled=false;}
      }catch(e){const dup=/already registered|already exists/i.test(e.message);
        msg.textContent=dup?"That email already has an account \u2014 use Sign in instead.":("Couldn't create account: "+e.message);go.disabled=false;}
    }else{msg.textContent="Signing in\u2026";
      try{await Store.signInPassword(v,p);/* onAuthChange handles the rest */}
      catch(e){msg.textContent="Sign-in failed: "+e.message;go.disabled=false;}}
  };
  if(go)go.onclick=submit;
  [em,pass].forEach(el=>{if(el)el.onkeydown=e=>{if(e.key==="Enter")submit();};});
  const sw=$("#agSwitch"); if(sw)sw.onclick=()=>{AG_MODE=su?"signin":"signup";renderAuthGate();};
}

function filterSort(){
  const f=STATE.filters;let rows=leaguePlayers().slice();
  if(f.qual)rows=rows.filter(p=>p.qualified);
  if(f.team){
    if(STATE.allLeagues&&f.team.includes("|")){const[fl,fc]=f.team.split("|");rows=rows.filter(p=>p.league===fl&&p.team===fc);}
    else if(!STATE.allLeagues)rows=rows.filter(p=>p.team===f.team);
  }
  if(f.role)rows=rows.filter(p=>p.role===f.role);
  if(f.country)rows=rows.filter(p=>p.country===f.country);
  if(f.born)rows=rows.filter(p=>String(p.born)===String(f.born));
  if(f.q){const q=f.q.toLowerCase();rows=rows.filter(p=>p.name.toLowerCase().includes(q));}
  const {key,dir}=STATE.sort;
  rows.sort((a,b)=>{let x,y;
    if(key==="league"){x=(leagueOf(a)||{meta:{}}).meta.name||"";y=(leagueOf(b)||{meta:{}}).meta.name||"";}
    else{x=a[key];y=b[key];}
    if(typeof x==="string")return x.localeCompare(y)*dir;
    return (x-y)*dir;});
  return rows;
}

/* ---------- radar chart (SVG) ---------- */
function radarSVG(players,colors){const LBL=arguments[2]!==false;
  const W=384,H=252,cx=W/2,cy=H/2+2,R=88,N=RADAR.length;
  const ang=i=>(-Math.PI/2)+i*2*Math.PI/N;
  const pt=(i,r)=>[cx+Math.cos(ang(i))*r, cy+Math.sin(ang(i))*r];
  let g="";
  // soft filled backdrop + rings
  g+=`<polygon points="${RADAR.map((_,i)=>pt(i,R).join(",")).join(" ")}" fill="var(--panel2)" stroke="none"/>`;
  for(let ring=1;ring<=4;ring++){const rr=R*ring/4;
    g+=`<polygon points="${RADAR.map((_,i)=>pt(i,rr).join(",")).join(" ")}" fill="none" stroke="var(--line-soft)" stroke-width="1"/>`;}
  RADAR.forEach((d,i)=>{const[x,y]=pt(i,R);g+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--line-soft)"/>`;});
  // dotted league-average hexagon (50th percentile by construction)
  g+=`<polygon points="${RADAR.map((_,i)=>pt(i,R*0.5).join(",")).join(" ")}" fill="none" stroke="var(--muted2)" stroke-width="1.6" stroke-dasharray="4 4"/>`;
  // player polygons
  players.forEach((p,pi)=>{if(!p)return;
    const pts=RADAR.map((d,i)=>{const v=Math.max(0,Math.min(100,p.pct[d.k]??50));return pt(i,R*v/100);});
    g+=`<polygon points="${pts.map(a=>a.join(",")).join(" ")}" fill="${colors[pi]}2E" stroke="${colors[pi]}" stroke-width="2.2" stroke-linejoin="round"/>`;
    pts.forEach(a=>g+=`<circle cx="${a[0]}" cy="${a[1]}" r="3" fill="${colors[pi]}" stroke="var(--panel)" stroke-width="1.2"/>`);});
  // labels last (on top), pushed outside with side-aware anchors so nothing clips
  if(LBL)RADAR.forEach((d,i)=>{const a=ang(i);const[lx,ly]=pt(i,R+14);
    const c=Math.cos(a);
    const anchor=c>0.35?"start":(c<-0.35?"end":"middle");
    const dy=Math.sin(a)>0.6?10:(Math.sin(a)<-0.6?-6:4);
    g+=`<text x="${lx}" y="${ly+dy}" fill="var(--muted)" font-size="11.5" font-family="var(--disp)" font-weight="600" text-anchor="${anchor}">${d.t}</text>`;});
  return `<svg class="radar" viewBox="0 0 ${W} ${H}">${g}</svg>`;
}

/* ===== Scouting 7-axis radar: eye (solid gold) over stats (dashed teal) ===== */
function scoutRadarSVG(p,opt){
  opt=opt||{};
  const mini=!!opt.mini;
  const W=mini?150:380, H=mini?150:300, cx=W/2, cy=H/2+(mini?0:4), R=mini?52:104, N=SCOUT_AXES.length;
  const ang=i=>(-Math.PI/2)+i*2*Math.PI/N;
  const pt=(i,r)=>[+(cx+Math.cos(ang(i))*r).toFixed(1), +(cy+Math.sin(ang(i))*r).toFixed(1)];
  const GOLD="#C99A3C", TEAL="#7FB3AB";
  let g="";
  // rings + spokes
  const rings=mini?[1]:[1,0.66,0.33];
  rings.forEach((f,ri)=>{g+=`<polygon points="${SCOUT_AXES.map((_,i)=>pt(i,R*f).join(",")).join(" ")}" fill="${ri===0?'var(--panel2)':'none'}" stroke="var(--line-soft)" stroke-width="1"/>`;});
  SCOUT_AXES.forEach((_,i)=>{const[x,y]=pt(i,R);g+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--line-soft)"/>`;});
  // stats polygon (dashed teal) — always shown when data exists
  const sVals=SCOUT_AXES.map(a=>statGrade(p,a.k));
  if(sVals.some(v=>v!=null)){
    const spts=SCOUT_AXES.map((a,i)=>{const v=Math.max(0,Math.min(10,sVals[i]??0));return pt(i,R*v/10);});
    g+=`<polygon points="${spts.map(a=>a.join(",")).join(" ")}" fill="${TEAL}22" stroke="${TEAL}" stroke-width="${mini?1.4:1.8}" stroke-dasharray="4 3" stroke-linejoin="round"/>`;
  }
  // eye polygon (solid gold) — only if any eye grade set
  const eg=eyeGrades(p);
  const hasEye=SCOUT_AXES.some(a=>eg[a.k]!=null);
  if(hasEye){
    const epts=SCOUT_AXES.map((a,i)=>{const v=(eg[a.k]!=null)?eg[a.k]:(sVals[i]??0);return pt(i,R*Math.max(0,Math.min(10,v))/10);});
    g+=`<polygon points="${epts.map(a=>a.join(",")).join(" ")}" fill="${GOLD}2E" stroke="${GOLD}" stroke-width="${mini?1.8:2.4}" stroke-linejoin="round"/>`;
    if(!mini)epts.forEach(a=>g+=`<circle cx="${a[0]}" cy="${a[1]}" r="3" fill="${GOLD}" stroke="var(--panel)" stroke-width="1.2"/>`);
  }
  // labels (full only) — placed just outside the ring; horizontal labels use a smaller
  // radial offset so long names (Ball Handling / Rim Protection) never clip the canvas.
  if(!mini)SCOUT_AXES.forEach((d,i)=>{const a=ang(i);const c=Math.cos(a),s=Math.sin(a);
    const off=Math.abs(c)>0.35?10:16;           // side labels sit closer in
    const[lx,ly]=pt(i,R+off);
    const anchor=c>0.35?"start":(c<-0.35?"end":"middle");
    const dy=s>0.6?11:(s<-0.6?-5:4);
    g+=`<text x="${lx}" y="${ly+dy}" fill="var(--muted)" font-size="10" font-family="var(--mono)" text-anchor="${anchor}">${d.t}</text>`;});
  return `<svg class="scoutradar${mini?' mini':''}" viewBox="0 0 ${W} ${H}">${g}</svg>`;
}

/* ---------- Shot chart ---------- */
const SHOT_ZONES={
  W3_L:[6,18,80,120,3],TOP3:[100,8,100,64,3],W3_R:[214,18,80,120,3],
  C3_L:[6,146,80,106,3],C3_R:[214,146,80,106,3],
  MID_C:[100,80,100,52,2],MID_L:[86,136,42,116,2],MID_R:[172,136,42,116,2],
  PAINT:[128,118,44,82,2],RIM:[126,204,48,48,2]};
function ppaColor(m,a,three){const ppa=(m*(three?3:2))/a;
  const t=Math.max(0,Math.min(1,(ppa-0.7)/(1.4-0.7)));
  const r=Math.round(198+(110-198)*t),g=Math.round(117+(159-117)*t),b=Math.round(91+(106-91)*t);
  return `rgb(${r},${g},${b})`;}
function shotChartSVG(p){
  const S=p.shots;
  if(!S||!Object.keys(S).length) return '<p class="hint">Shot-location data not loaded for this player. Run <code>scraper_shots.py</code> to populate shot charts (see README).</p>';
  const maxA=Math.max(1,...Object.values(S).map(v=>v[1]));
  let tm=0,ta=0,t3m=0,t3a=0,svg=`<svg viewBox="0 0 300 260" class="shotchart">`;
  svg+=`<rect x="1.5" y="1.5" width="297" height="257" rx="8" fill="var(--bg2)" stroke="var(--line)"/>`;
  for(const z in SHOT_ZONES){const [x,y,w,ht,pts]=SHOT_ZONES[z];const v=S[z];
    if(v&&v[1]>0){const [m,a]=v;const three=pts===3;const op=(0.28+0.6*(a/maxA)).toFixed(2);
      ta+=a;tm+=m;if(three){t3a+=a;t3m+=m;}
      svg+=`<rect x="${x}" y="${y}" width="${w}" height="${ht}" rx="5" fill="${ppaColor(m,a,three)}" fill-opacity="${op}" stroke="var(--line)"/>`;
      svg+=`<text x="${x+w/2}" y="${y+ht/2-1}" text-anchor="middle" font-size="12" font-weight="800" fill="#17130d">${m}/${a}</text>`;
      svg+=`<text x="${x+w/2}" y="${y+ht/2+11}" text-anchor="middle" font-size="9" fill="#17130d" opacity="0.8">${Math.round(m/a*100)}%</text>`;
    } else svg+=`<rect x="${x}" y="${y}" width="${w}" height="${ht}" rx="5" fill="none" stroke="var(--line)" stroke-dasharray="2 3"/>`;
  }
  svg+=`<circle cx="150" cy="228" r="7" fill="none" stroke="var(--muted)" stroke-width="1.5"/>`;
  svg+=`<path d="M18 254 A146 150 0 0 1 282 254" fill="none" stroke="var(--muted)" stroke-dasharray="3 3" opacity="0.55"/>`;
  svg+=`</svg>`;
  const fg=ta?Math.round(tm/ta*100):0, tp=t3a?Math.round(t3m/t3a*100):0;
  return `<div class="shotwrap">${svg}<div><div class="shotkey"><span>Colour = points per attempt:</span><i style="background:rgb(198,117,91)"></i>cold <i style="background:rgb(154,138,98)"></i> <i style="background:rgb(110,159,106)"></i>hot</div>
    <div style="margin-top:10px;font-size:13px;color:var(--muted);line-height:1.8">
    Field goals: <b style="color:var(--txt)">${tm}/${ta}</b> (${fg}%)<br>
    Two-pointers: <b style="color:var(--txt)">${tm-t3m}/${ta-t3a}</b><br>
    Three-pointers: <b style="color:var(--txt)">${t3m}/${t3a}</b> (${tp}%)<br>
    <span class="hint">Box size = shot volume · label = made/attempted.</span></div></div></div>`;
}

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
function fullDate(dt){if(!dt||dt.length<10)return dt||"\u2014";
  const y=dt.slice(0,4),m=+dt.slice(5,7),d=+dt.slice(8,10);
  return d+" "+(MONTHS[m-1]||"")+" "+y;}
function openTeamRoster(leagueId,code){openTeamIn(leagueId,code);
  requestAnimationFrame(()=>{const el=$("#rosterPanel");if(el)el.scrollIntoView({behavior:"smooth",block:"start"});});}
function openTeamIn(leagueId,code){const L=STATE.data.leagues.find(x=>x.meta.id===leagueId);
  if(L){STATE.allLeagues=false;STATE.league=L;const sel=$("#leagueSel");if(sel)sel.value=leagueId;updateScopeLabel();}

function gameLogTable(p){
  const grp=(p._grp&&p._grp.length>1)?p._grp:[p];

  if(!secs.length) return '<p class="hint">No game log available.</p>';
  const head=`<thead><tr><th class="l">DATE</th><th class="l">OPP</th><th class="l">RESULT</th><th>MIN</th><th>PTS</th><th>FG</th><th>3P</th><th>FT</th><th>REB</th><th>AST</th><th>STL</th><th>BLK</th><th>TO</th><th>PIR</th><th>+/-</th></tr></thead>`;
  let body="";
  secs.forEach((x,si)=>{const Lx=leagueOf(x);
    if(grp.length>1){

      body+=`<tr class="glogsep" data-sec="${si}" onclick="glToggle(this)" title="Tap to collapse / expand this competition">
        <td class="l" colspan="3"><span class="glcaret">\u25be</span> ${Lx.meta.name} \u00b7 ${x.teamName} \u00b7 ${x.g} games \u2014 averages:</td>
        <td>${fmt(x.mpg)}</td><td><b>${fmt(x.ppg)}</b></td><td>${fmt(x.fgp)}%</td><td>${fmt(x.f3p)}%</td><td>${fmt(x.ftp)}%</td>
        <td>${fmt(x.rpg)}</td><td>${fmt(x.apg)}</td><td>${fmt(x.spg)}</td><td>${fmt(x.bpg)}</td><td>${fmt(x.topg)}</td>
        <td style="font-weight:700">${fmt(x.pir)}</td><td>${pm>0?"+":""}${fmt(pm)}</td></tr>`;
    }
    const rows=x.gameLog.slice().reverse();
    body+=rows.map(g=>{const[dt,opp,ha,win,tp,op,mn,pts,fgm,fga,f3m,f3a,ftm,fta,reb,ast,stl,blk,tov,pir,pm]=g;
      const tn=(Lx.teams.find(tt=>tt.code===opp)||{}).name||opp;
      return `<tr data-sec="${si}"><td class="l" style="color:var(--muted);white-space:nowrap">${fullDate(dt)}</td>
        <td class="l">${ha==='A'?'@ ':'vs '}<span class="tlink" onclick="openTeamIn('${Lx.meta.id}','${opp}')">${tn}</span></td>
        <td class="l" style="color:${win?'var(--good)':'var(--bad)'}">${win?'W':'L'} ${tp}\u2013${op}</td>
        <td>${mn}</td><td><b>${pts}</b></td><td>${fgm}-${fga}</td><td>${f3m}-${f3a}</td><td>${ftm}-${fta}</td>
        <td>${reb}</td><td>${ast}</td><td>${stl}</td><td>${blk}</td><td>${tov}</td>
        <td style="font-weight:700">${pir}</td>
        <td style="color:${pm>0?'var(--good)':pm<0?'var(--bad)':'var(--muted)'}">${pm>0?'+':''}${pm}</td></tr>`;}).join('');
  });
  return `<div class="glogscroll tablewrap"><table class="glog">${head}<tbody>${body}</tbody></table></div>`;
}
function glToggle(tr){
  const sec=tr.dataset.sec, tb=tr.closest("tbody");

function profileSiblings(){
  // players in the CURRENT scope/order used on the Players list (respects league scope + qualified)

// The projected level describes the PERSON, so it must be identical no matter which

function personGrade(p){

// A star rating is a level opinion: 5★≈EuroLeague, 4★≈EuroCup, 3★≈Top, 2★≈Mid, 1★≈Low.
// We pull the production grade toward the rating so a proven player with a down season
// isn't stuck at a harsh level once you've rated him. No rating → pure production.

  const prod=personGrade(p);

  if(prod==null) return target;          // rated but no stats → use rating
  // higher ratings trust your eye more: 3★ is an even blend, 5★ is mostly your call.
  // w = weight on YOUR rating (0.5 at 3★ up to 0.8 at 5★, down to 0.4 at 1★)

/* RealGM: link to a player search (RealGM has no stable per-player id in our data,
   so we deep-link to their site search, which resolves to the player page). If the
   user has saved an explicit RealGM URL override, use that instead. */
function realgmSearchURL(p){
  if(p&&p._rgm)return p._rgm;
  const q=encodeURIComponent(p.name);
  return `https://basketball.realgm.com/search?q=${q}`;
}
/* Eurobasket.com: player pages are basketball.eurobasket.com/player/<Name>/<id>, but the
   numeric id isn't in our data and their on-site search is a POST form (no clean GET).
   So: if the user saved an exact Eurobasket profile URL (_ext) we use it; otherwise we
   deep-link a site-scoped search that surfaces the player's Eurobasket page as the top hit. */
function eurobasketURL(p){
  if(p&&p._ext&&/eurobasket\.com/i.test(p._ext))return p._ext;
  const terms=[p.name,p.country||"","basketball"].filter(Boolean).join(" ");
  return "https://www.google.com/search?q="+encodeURIComponent("site:basketball.eurobasket.com "+terms);
}
/* Agent / Agency: manual field. OVR.bio[id].agent = agent name, .agency = agency,
   .agentUrl = RealGM agent-client-list URL. AGENCY_LIST is a user-editable roster. */
/* Agency dropdown roster (user-editable). Renames are normalized on read. */
const AGENCY_RENAME={"Wasserman":"The Team","TeamWass":"The Team"};
function normAgency(a){return a?(AGENCY_RENAME[a]||a):a;}
function agencyList(){
  const base=(window.EUROSCOUT_AGENCIES||[]);
  let local=[];try{local=JSON.parse(localStorage.getItem("euroscout:agencies")||"[]");}catch(e){}
  return [...new Set([...base,...local].map(normAgency))].filter(Boolean).sort((a,b)=>a.localeCompare(b));
}
function addAgency(name){if(!Store.canEdit())return;name=(name||"").trim();if(!name)return;
  let local=[];try{local=JSON.parse(localStorage.getItem("euroscout:agencies")||"[]");}catch(e){}
  if(!local.includes(name)){local.push(name);localStorage.setItem("euroscout:agencies",JSON.stringify(local));try{Sync.stampKey("euroscout:agencies");}catch(e){}try{Store.pushAppKey("euroscout:agencies");}catch(e){}}
}
/* Agent roster + agent→agency map. Base map from overrides.js, plus any you add live. */
function agentMap(){
  const base=Object.assign({},window.EUROSCOUT_AGENTS||{});
  let local={};try{local=JSON.parse(localStorage.getItem("euroscout:agents")||"{}");}catch(e){}
  return Object.assign(base,local);
}
function agentList(){return Object.keys(agentMap()).sort((a,b)=>a.localeCompare(b));}
function agencyForAgent(agent){const m=agentMap();return agent&&m[agent]?normAgency(m[agent]):"";}
function addAgent(agent,agency){if(!Store.canEdit())return;agent=(agent||"").trim();if(!agent)return;
  let local={};try{local=JSON.parse(localStorage.getItem("euroscout:agents")||"{}");}catch(e){}
  local[agent]=(agency||"").trim(); localStorage.setItem("euroscout:agents",JSON.stringify(local));try{Sync.stampKey("euroscout:agents");}catch(e){}try{Store.pushAppKey("euroscout:agents");}catch(e){}
}
function agentCellHTML(p){
  const agent=p.agent, agency=p.agency, url=p.agentUrl;
  if(!agent&&!agency)return '<span class="biedit" onclick="openEditModal(\''+p.id+'\')">\u2014</span>';
  const ae=agent?encodeURIComponent(agent).replace(/'/g,"%27"):"";

  const agentEl=agent?`<span class="agentchip" onclick="openAgentRoster('${ae}')" title="Show ${escAttr(agent)}'s players">${agent}</span>`:"";
  const agencyEl=agency?`<span class="agencychip" onclick="openAgencyRoster('${ce}')" title="Show all ${escAttr(agency)} players">${agency}</span>`:"";
  const ext=url?` <a href="${escAttr(url)}" target="_blank" rel="noopener" class="agentext" title="Open agent profile" onclick="event.stopPropagation()">\u2197</a>`:"";
  return `${agentEl}${agent&&agency?" ":""}${agencyEl}${ext}`;

function agentRosterList(matchFn){
  return scoutPool().filter(matchFn).sort((a,b)=>

function teamRoster(val){
  if(!val)return null;

  const t=L.teams.find(x=>x.code===code); if(!t)return null;
  const players=L.players.filter(p=>p.team===code);
  // sort by jersey number (numeric), unknowns last
  players.sort((a,b)=>{
    const ja=a.jersey!=null&&a.jersey!==""?parseInt(a.jersey,10):999;
    const jb=b.jersey!=null&&b.jersey!==""?parseInt(b.jersey,10):999;

  });

function renderCompare(){
  const groups=[]; const seen=new Set();
  allPlayersFlat().forEach(p=>{const g=gid(p);if(seen.has(g))return;seen.add(g);
    const n=newestOf(p); if(n.qualified||p._grp&&p._grp.some(x=>x.qualified))groups.push(n);});
  groups.sort((a,b)=>a.name.localeCompare(b.name));
  // migrate any legacy {a,b} state to the slots array
  if(!STATE.compare.slots){STATE.compare.slots=[STATE.compare.a||null,STATE.compare.b||null,null,null];}
  const slots=STATE.compare.slots;
  const sel=(idx,cur)=>{
    const opts=STATE.data.leagues.map(L=>`<optgroup label="${L.meta.name}">${groups.filter(p=>p.league===L.meta.id).sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`<option value="${p.id}" ${cur===p.id?"selected":""}>${p.name} (${p.teamName})</option>`).join("")}</optgroup>`).join("");
    return `<div class="cbx" data-cbx="cmp${idx}">
      <input type="text" class="cbxin" id="cmp${idx}in" placeholder="Player ${idx+1}\u2026" autocomplete="off" value="${cur?player(cur).name:""}"/>
      <select class="cbxsel f" id="cmp${idx}"><option value="">\u2014 or pick from list \u2014</option>${opts}</select>
      ${cur?`<button class="cbxclear" data-clear="${idx}" title="Clear">\u00d7</button>`:""}
      <div class="cbxres hidden"></div></div>`;};
  const COLORS=["#7FB3AB","#D2925E","#8E86C9","#C56B7E"], ST="\u2605";
  const picked=slots.map(id=>id?player(id):null);
  const active=picked.filter(Boolean);
  const activeIdx=picked.map((p,i)=>p?i:-1).filter(i=>i>=0);
  let body='<div class="empty">Pick two or more players to compare (up to four).</div>';
  if(active.length>=2){
    // stat rows: best value across the active players is highlighted
    const statRows=CMP_ROWS.map(([lab,k,hi])=>{
      const vals=active.map(p=>{const v=p[k];return (v!=null&&!isNaN(v))?+v:null;});
      const valid=vals.filter(v=>v!=null);
      let best=null; if(valid.length){best=hi?Math.max(...valid):Math.min(...valid);}
      const cells=active.map((p,i)=>{const v=vals[i];const win=(v!=null&&best!=null&&v===best&&valid.length>1);
        return `<td class="v${win?" win":""}">${win?ST+" ":""}${statVal(p,k)}</td>`;}).join("");
      return `<tr>${cells}<td class="lbl">${lab}</td></tr>`;}).join("");
    const bioRow=(get,lab)=>`<tr class="bio">${active.map(p=>`<td class="v">${get(p)||"\u2013"}</td>`).join("")}<td class="lbl">${lab}</td></tr>`;
    const bioRows=bioRow(p=>p.height?(p.height/100).toFixed(2)+" m":"","HEIGHT")
      +bioRow(p=>p.born,"BORN")
      +bioRow(p=>p.teamName,"CLUB")
      +bioRow(p=>(p.pos&&p.pos!=="-")?p.pos:p.role,"POS")
      +bioRow(p=>p.country,"COUNTRY")
      +bioRow(p=>leagueOf(p).meta.name,"LEAGUE");
    const heads=active.map((p,i)=>`<th class="nm" onclick="openProfile('${p.id}')" style="color:${COLORS[i]}">${p.name}</th>`).join("");
    const legend=active.map((p,i)=>`<span><span class="dot" style="background:${COLORS[i]}"></span>${p.name}</span>`).join("");
    const shots=active.map((p,i)=>`<div class="cmpshot" style="--cc:${COLORS[i]}">${shotChartSVG(p)}<div class="cmpshot-nm"><span class="sw" style="background:${COLORS[i]}"></span>${p.name}</div></div>`).join("");
    body=`
    <div class="twocol">
      <div class="panel"><h3>Percentile overlay (per-40)</h3>
        ${radarSVG(active,COLORS)}
        <div class="legend">${legend}</div>
      </div>
      <div class="panel"><h3>Head to head</h3>
        <table class="cmptbl cmp${active.length}">
          <thead><tr>${heads}<th class="k"></th></tr></thead>
          <tbody>${bioRows}<tr class="cmpdiv"><td colspan="${active.length+1}"></td></tr>${statRows}</tbody>
        </table>
        <p class="hint" style="margin-top:8px">${ST} = best value among the compared players \u00b7 stats within each player's own competition.</p>
      </div>
    </div>
    <div class="panel" style="margin-top:16px"><h3>Shot chart by zones</h3>
      <div class="cmpshots cmpshots${active.length}">${shots}</div>
    </div>`;
  }
  $("#app").innerHTML=`<div class="view">
    <h1 class="title">Compare players</h1>
    <div class="sub">Pick two to four players from any competition \u00b7 bio, stats head-to-head, radar overlay and shot charts.</div>
    <div class="cmpsel cmpsel4">${slots.map((cur,i)=>sel(i,cur)).join("")}</div>
    ${body}
  </div>`;
  const wireCbx=(idx)=>{
    const root=$(`[data-cbx="cmp${idx}"]`); if(!root)return;
    const inp=root.querySelector(".cbxin"), selEl=root.querySelector(".cbxsel"), box=root.querySelector(".cbxres");
    let results=[];
    const close=()=>{box.classList.add("hidden");box.innerHTML="";};
    const paint=()=>{box.innerHTML=results.map((p,i)=>{const Lp=leagueOf(p);
      return `<div class="gsitem" data-i="${i}">${p.img?`<img src="${p.img}" loading="lazy" onerror="this.style.visibility='hidden'"/>`:'<img alt=""/>'}<div class="gi"><div class="gn">${p.name}</div><div class="gm">${p.teamName} \u00b7 ${fmt(p.ppg)} pts</div></div><span class="glg">${Lp.meta.name}</span></div>`;}).join("");
      box.classList.remove("hidden");
      box.querySelectorAll(".gsitem").forEach(el=>el.onmousedown=e=>{e.preventDefault();
        const p=results[+el.dataset.i]; STATE.compare.slots[idx]=p.id; renderCompare();});};
    if(selEl)selEl.onchange=()=>{if(selEl.value){STATE.compare.slots[idx]=selEl.value;renderCompare();}};
    inp.oninput=()=>{const q=normName(inp.value.trim());
      if(q.length<2){close();return;}
      results=groups.filter(p=>normName(p.name).includes(q)).slice(0,8);
      if(!results.length){box.innerHTML='<div class="gsempty">No players found</div>';box.classList.remove("hidden");return;}
      paint();};
    inp.onfocus=()=>{inp.select();};
    inp.onblur=()=>setTimeout(close,160);
    inp.onkeydown=e=>{if(e.key==="Enter"&&results.length){STATE.compare.slots[idx]=results[0].id;renderCompare();}
      else if(e.key==="Escape")close();};
  };
  slots.forEach((_,i)=>wireCbx(i));
  $$(".cbxclear").forEach(b=>b.onclick=()=>{STATE.compare.slots[+b.dataset.clear]=null;renderCompare();});
}

// find the SL player object that corresponds to a European player (by normalized name)
function exhibMatch(p){ if(!p||p.league==="sl")return null; const nn=normName(p.name); const m=EXHIB_BYNN[nn]; return (m&&m._euMatch)?m:null; }

function renderExhib(){
  if(!EXHIB){ $("#app").innerHTML='<div class="empty">No exhibition data loaded.</div>'; return; }
  const s=STATE.scout;
  let pool=STATE.data.leagues.find(l=>l.meta.id==="sl").players.slice();
  // qualified only on the board (>=2 GP, >=8 mpg) — the rest are noise
  pool=pool.filter(p=>p.qualified);
  // filters reuse scout state (search, role, tag, status) but scoped to SL
  if(s.roles.size) pool=pool.filter(p=>s.roles.has(p.role));
  if(s.status!=="all") pool=pool.filter(p=>scoutStatusOf(p)===s.status);
  if(s.tags.size)    pool=pool.filter(p=>{const t=playerTags(p);return [...s.tags].every(tag=>t.includes(tag));});
  if(s.q){const q=s.q.toLowerCase(),qn=normName(s.q);
    pool=pool.filter(p=>p.name.toLowerCase().includes(q)||normName(p.name).includes(qn));}
  const rateOf=p=>{const r=recOf(p);return r&&r.rating||0;};
  if(s.sort==="myrating")     pool.sort((a,b)=>rateOf(b)-rateOf(a)||((statGradeOverall(b)??-1)-(statGradeOverall(a)??-1)));
  else if(s.sort==="ppg")     pool.sort((a,b)=>(b.ppg||0)-(a.ppg||0));
  else if(s.sort==="name")    pool.sort((a,b)=>a.name.localeCompare(b.name));
  else                        pool.sort((a,b)=>(statGradeOverall(b,{raw:true})??-1)-(statGradeOverall(a,{raw:true})??-1));

  const matched=pool.filter(p=>p._euMatch).length;
  const cap=180, shown=pool.slice(0,cap);
  const cards=shown.map(p=>scoutCard(p)).join("");

/* ---------- Scout board (homepage) ---------- */
const ROLE_OPTS=[["Guard","Guards"],["Forward","Forwards"],["Center","Centers"]];
function scoutPool(){
  // one card per person (dedupe merged identities), across all league seasons.
  // Exhibitions (Summer League) are excluded here — they live on their own tab.
  const seen=new Set(),out=[];
  allPlayersFlat().forEach(p=>{if(p.league==="sl")return;const g=gid(p);if(seen.has(g))return;seen.add(g);out.push(p);});
  return out;
}
function playerTags(p){const r=recOf(p);return (r&&r.tags)||[];}
// Concatenated lower-cased note text (all report sections + tags) for searching.
function noteText(p){const r=recOf(p);if(!r)return "";
  let s="";const rep=r.report;
  if(rep){if(typeof rep==="string"){s+=" "+rep;}else{["nAth","nOff","nDef","nIntel","nProj","overall"].forEach(k=>{if(rep[k])s+=" "+rep[k];});}}
  if(r.tags&&r.tags.length)s+=" "+r.tags.join(" ");
  return s.toLowerCase();}
function isWatched(p){return playerTags(p).includes(WATCH_TAG);}
function scoutStatusOf(p){
  const r=recOf(p);
  const rated=(r&&(r.rating>0||(r.eye&&Object.keys(r.eye).length)||(r.report&&r.report.trim())));
  return rated?"scouted":"unscouted";
}
/* ---------- Home-board features: form, young-riser, recently-viewed, saved views ---------- */
// FORM: recent 3 games' avg PIR vs season avg PIR. Returns {dir:1|0|-1, delta, label}.
function formOf(p){
  const gl=p.gameLog||[]; if(gl.length<4)return null;
  const pir=r=>+(r[19]||0);
  const seasonAvg=gl.reduce((a,r)=>a+pir(r),0)/gl.length;
  const last3=gl.slice(-3);
  const recentAvg=last3.reduce((a,r)=>a+pir(r),0)/last3.length;
  const delta=recentAvg-seasonAvg;
  const dir=delta>=4?1:delta<=-4?-1:0;
  return {dir,delta:Math.round(delta*10)/10,recentAvg:Math.round(recentAvg*10)/10};
}
function formArrowHTML(p){
  const f=formOf(p); if(!f||f.dir===0)return "";
  const up=f.dir>0;
  return `<span class="formarrow ${up?'up':'down'}" title="Last 3 games ${up?'above':'below'} season form (${f.delta>0?'+':''}${f.delta} PIR)">${up?'▲':'▼'}</span>`;
}
// YOUNG RISER: high grade AND young for the league. Age threshold scales a bit by tier.
function riserOf(p){
  const g=statGradeOverall(p,{raw:true}); const age=p.age;
  if(g==null||age==null)return null;
  // "young" = 21 or under; "riser" = top-third stat production in its league
  if(age<=21 && g>=6.5) return {age,grade:statGradeOverall(p)};
  return null;
}
function riserBadgeHTML(p){
  const r=riserOf(p); if(!r)return "";
  return `<span class="riserbadge" title="Young riser — ${r.age} y/o producing above his league's level">↑ ${r.age}</span>`;
}
// RECENTLY VIEWED (localStorage, most-recent-first, capped)
const RECENT_KEY="euroscout:recent";
function recentGet(){try{return JSON.parse(localStorage.getItem(RECENT_KEY)||"[]");}catch(e){return [];}}
function recentPush(id){
  // store the person's canonical id so switching competitions doesn't list them multiple times
  const p=player(id); const key=(p&&gid(p))||id;
  // also drop any stale ids that resolve to the same person
  let a=recentGet().filter(x=>{const xp=player(x);const xk=(xp&&gid(xp))||x;return xk!==key;});
  a.unshift(key); a=a.slice(0,12);
  try{localStorage.setItem(RECENT_KEY,JSON.stringify(a));}catch(e){}
}
// SAVED VIEWS (localStorage): named filter combinations
const VIEWS_KEY="euroscout:views";
function viewsGet(){try{return JSON.parse(localStorage.getItem(VIEWS_KEY)||"[]");}catch(e){return [];}}
function viewsSave(list){if(!Store.canEdit())return;try{localStorage.setItem(VIEWS_KEY,JSON.stringify(list));Sync.stampKey(VIEWS_KEY);Store.pushAppKey(VIEWS_KEY);}catch(e){}}
function currentViewState(){const s=STATE.scout;return {q:s.q,leagues:[...s.leagues],roles:[...s.roles],tags:[...s.tags],status:s.status,sort:s.sort};}
function viewIsActive(v){const s=STATE.scout;
  return v.q===s.q && v.status===s.status && v.sort===s.sort
    && v.leagues.length===s.leagues.size && v.leagues.every(x=>s.leagues.has(x))
    && v.roles.length===s.roles.size && v.roles.every(x=>s.roles.has(x))
    && v.tags.length===s.tags.size && v.tags.every(x=>s.tags.has(x));}
function applyView(v){const s=STATE.scout;
  s.q=v.q||"";s.status=v.status||"all";s.sort=v.sort||"grade";
  s.leagues=new Set(v.leagues||[]);s.roles=new Set(v.roles||[]);s.tags=new Set(v.tags||[]);
  renderScout();}
function saveCurrentView(){
  const name=prompt("Name this view (e.g. \"Young ACB wings, unscouted\"):");
  if(!name)return;
  const list=viewsGet(); list.push({name:name.trim(),...currentViewState()}); viewsSave(list); renderScout();
}
function deleteView(i){const list=viewsGet();list.splice(i,1);viewsSave(list);renderScout();}
// NEEDS ATTENTION: actionable items — watchlisted & unscouted, form flips, unscouted young risers
function needsAttention(pool){
  const watchUnscouted=pool.filter(p=>isWatched(p)&&scoutStatusOf(p)==="unscouted");
  const hotForm=pool.filter(p=>{const f=formOf(p);return f&&f.dir>0;}).sort((a,b)=>formOf(b).delta-formOf(a).delta);
  const risers=pool.filter(p=>riserOf(p)&&scoutStatusOf(p)==="unscouted").sort((a,b)=>(statGradeOverall(b)??0)-(statGradeOverall(a)??0));
  return {watchUnscouted,hotForm,risers};
}

/* ---------- Watchlist big board ---------- */
function renderWatchlist(){
  const rateOf=p=>{const r=recOf(p);return (r&&r.rating)||0;};
  let pool=scoutPool().filter(isWatched);

  else if(sort==="level") pool.sort((a,b)=>{const bl=levelBand(b),al=levelBand(a);return (bl?bl.i:-1)-(al?al.i:-1)||((statGradeOverall(b)??-1)-(statGradeOverall(a)??-1));});
  else if(sort==="age")   pool.sort((a,b)=>(a.age||99)-(b.age||99));
  else if(sort==="name")  pool.sort((a,b)=>a.name.localeCompare(b.name));

    const photo=p.img?`<img src="${p.img}" loading="lazy" onerror="this.parentNode.classList.add('noimg');this.remove()"/>`:initials(p.name);

    return `<div class="wrow" data-id="${p.id}">

  };
  $("#app").innerHTML=`<div class="view watchView">

      <div>
        <h1 class="title" style="margin:0">Watchlist big board</h1>

      </div>
      <div class="wsorts"><span class="sortlab">Sort</span>${sortBtn("rating","My rating")}${sortBtn("grade","Stat grade")}${sortBtn("level","Level")}${sortBtn("age","Youngest")}${sortBtn("name","Name")}</div>
    </div>
    ${pool.length?`<div class="wboard">${pool.map(row).join("")}</div>`:`<div class="empty" style="margin-top:20px">No players on your watchlist yet. Tap the ☆ star on any player card or profile to add them here.</div>`}
  </div>`;
  $$(".wsort").forEach(b=>b.onclick=()=>{STATE.watchSort=b.dataset.ws;renderWatchlist();});
  $$(".wrow").forEach(r=>r.onclick=e=>{
    if(e.target.closest("[data-rm]")){e.stopPropagation();const id=e.target.closest("[data-rm]").dataset.rm;
      toggleTag(id,WATCH_TAG).then(renderWatchlist);return;}
    openProfile(r.dataset.id);});

function renderScout(){

  if(s.status!=="all") pool=pool.filter(p=>scoutStatusOf(p)===s.status);
  if(s.tags.size)    pool=pool.filter(p=>{const t=playerTags(p);return [...s.tags].every(tag=>t.includes(tag));});
  if(s.riserOnly)    pool=pool.filter(p=>riserOf(p));
  if(s.q){const q=s.q.toLowerCase(),qn=normName(s.q);

          <div class="naName">${it.p.name}</div></div>

      <button class="viewChip add" id="saveViewBtn" title="Save current filters as a view">+ Save current</button>

    <div class="recentRow">

  const tagChip=t=>{const on=s.tags.has(t);const isW=t===WATCH_TAG;

  const tag=(e.target.tagName||"").toLowerCase();

const DEFAULT_TEAM_LINKS=[["euroleague:RED","aba:CZV"],["eurocup:LJU","aba:COL"],["euroleague:MAD","acb:RMB"],["euroleague:PAM","acb:VBC"],["euroleague:BAS","acb:BKN"],["euroleague:MIL","lba:MIO"],["euroleague:VIR","lba:BOV"],["eurocup:TRN","lba:TN"],["eurocup:VNC","lba:VE"],["euroleague:MUN","bbl:MUC"],["eurocup:NIN","bbl:CHE"],["eurocup:ULM","bbl:ULM"],["eurocup:HAM","bbl:HAM"],["euroleague:MCO","lnb:MON"],["euroleague:PRS","lnb:PAB"],["euroleague:ASV","lnb:VIL"]];
function teamKey(lid,code){return lid+":"+code;}
function teamGroup(lid,code){
  const links=[...DEFAULT_TEAM_LINKS,...(OVR.teamLinks||[])];
  const found=new Set([teamKey(lid,code)]);
  // same code in other leagues links automatically (DUB, PAR, BUD, CLU...)
  STATE.data.leagues.forEach(L=>{if(L.meta.id!==lid&&L.teams.some(t=>t.code===code))found.add(teamKey(L.meta.id,code));});
  let grew=true;
  while(grew){grew=false;
    links.forEach(([a,b])=>{
      if(found.has(a)&&!found.has(b)){found.add(b);grew=true;}
      if(found.has(b)&&!found.has(a)){found.add(a);grew=true;}});}
  const out=[];
  found.forEach(k=>{const[l,c]=k.split(":");const L=STATE.data.leagues.find(x=>x.meta.id===l);
    const t=L&&L.teams.find(x=>x.code===c);if(t)out.push({league:l,code:c,team:t,L});});
  out.sort((a,b)=>STATE.data.leagues.findIndex(x=>x.meta.id===a.league)-STATE.data.leagues.findIndex(x=>x.meta.id===b.league));
  return out;
}
function teamScopeAll(){return STATE.profileScope==="all";}
function teamAgg(L){
  STATE._tagg=STATE._tagg||{};
  if(STATE._tagg[L.meta.id])return STATE._tagg[L.meta.id];
  const side={};(L.games||[]).forEach(g=>{side[g.date+"|"+g.a+"|H"]=g.h;side[g.date+"|"+g.h+"|A"]=g.a;});
  const T={},OP={};
  const mk=()=>({fgm:0,fga:0,f3m:0,f3a:0,ftm:0,fta:0,reb:0,ast:0,stl:0,blk:0,tov:0,pir:0,pts:0});
  L.players.forEach(p=>(p.gameLog||[]).forEach(r=>{
    const tc=side[r[0]+"|"+r[1]+"|"+r[2]];if(!tc)return;
    const opp=r[1];
    const o=T[tc]=T[tc]||mk(); const q=OP[opp]=OP[opp]||mk();
    [o,q].forEach(x=>{x.fgm+=r[8];x.fga+=r[9];x.f3m+=r[10];x.f3a+=r[11];x.ftm+=r[12];x.fta+=r[13];
      x.reb+=r[14];x.ast+=r[15];x.stl+=r[16];x.blk+=r[17];x.tov+=r[18];x.pir+=r[19];x.pts+=r[7];});}));
  const played={};(L.games||[]).forEach(g=>{
    [[g.h,g.hs,g.as],[g.a,g.as,g.hs]].forEach(([c,pf,pa])=>{
      const o=played[c]=played[c]||{gp:0,pf:0,pa:0};o.gp++;o.pf+=pf;o.pa+=pa;});});
  const out={};
  L.teams.forEach(t=>{const a=T[t.code],q=OP[t.code],pl=played[t.code];
    const g=Math.max(1,pl?pl.gp:(t.w+t.l));
    const base=pl?{ppg:pl.pf/g,oppg:pl.pa/g,net:(pl.pf-pl.pa)/g}:{ppg:t.ppg,oppg:t.oppg,net:t.net};
    if(!a){out[t.code]=base;return;}
    const f2m=a.fgm-a.f3m,f2a=a.fga-a.f3a;
    const poss=a.fga+0.44*a.fta+a.tov, opPoss=q?(q.fga+0.44*q.fta+q.tov):0;
    out[t.code]={...base,
      rpg:a.reb/g,apg:a.ast/g,spg:a.stl/g,bpg:a.blk/g,tpg:a.tov/g,pirg:a.pir/g,
      fgp:a.fga?a.fgm/a.fga*100:0,f2p:f2a?f2m/f2a*100:0,f3p:a.f3a?a.f3m/a.f3a*100:0,ftp:a.fta?a.ftm/a.fta*100:0,
      f3apg:a.f3a/g,ftapg:a.fta/g,astto:a.tov?a.ast/a.tov:a.ast,
      pace:poss/g,ortg:poss?a.pts/poss*100:0,drtg:(q&&opPoss)?q.pts/opPoss*100:0,
      efg:a.fga?(a.fgm+0.5*a.f3m)/a.fga*100:0,ts:a.pts/(2*(a.fga+0.44*a.fta))*100,
      astpct:a.fgm?a.ast/a.fgm*100:0,tovpct:poss?a.tov/poss*100:0,
      f3ar:a.fga?a.f3a/a.fga*100:0,ftr:a.fga?a.fta/a.fga*100:0,
      orebdiff:q?(a.reb-q.reb)/g:0,
      oppfgp:(q&&q.fga)?q.fgm/q.fga*100:0,oppf3p:(q&&q.f3a)?q.f3m/q.f3a*100:0,oppefg:(q&&q.fga)?(q.fgm+0.5*q.f3m)/q.fga*100:0};});
  STATE._tagg[L.meta.id]=out;return out;
}

  ["apg","AST",1],["spg","STL",1],["bpg","BLK",1],["tpg","TOV",0],["pirg","PIR",1],

const TEAM_CARDS_ADV=[["pace","PACE",1],["ortg","ORTG",1],["drtg","DRTG",0],["efg","eFG%",1],["ts","TS%",1],

function teamRank(L,code,k,hi){

    vals=[];STATE.data.leagues.forEach(Lx=>{const ax=teamAgg(Lx);Lx.teams.forEach(t=>{const v=ax[t.code]?ax[t.code][k]:null;if(v!=null&&!isNaN(v))vals.push({c:Lx.meta.id+":"+t.code,v});});});

          <div class="comptabs" style="margin-top:8px">${grp.length>1?`<span class="hint" style="align-self:center;margin-right:2px">Competitions:</span>${grp.map(x=>`<button class="comptab ${x.league===L.meta.id&&x.code===t.code?"active":""}" onclick="openTeamIn('${x.league}','${x.code}')" title="${x.L.meta.name} \u00b7 ${x.team.name}">${x.L.meta.name}</button>`).join("")}<span class="phsep" style="align-self:center">\u00b7</span>`:""}
            <div class="seg seg-sm inscope">
              <button onclick="setScopeMode('league')" class="${STATE.profileScope!=='all'?'active':''}">vs&nbsp;Lg</button>
              <button onclick="setScopeMode('all')" class="${STATE.profileScope==='all'?'active':''}">vs&nbsp;All</button>
            </div></div>
        </div>
        <div class="statline">
          <div class="s"><div class="v">${t.w}-${t.l}</div><div class="k">Record</div></div>
          <div class="s"><div class="v">${fmt(t.winPct)}</div><div class="k">Win%</div></div>
          <div class="s"><div class="v">${t.group?t.group+t.rank:t.rank}</div><div class="k">Rank</div></div>
        </div>
      </div>
    </div>
    <div class="panel" style="margin-top:16px">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px">
        <h3 style="margin:0">Team averages \u00b7 ${L.meta.name}</h3>
        <div class="seg"><button class="${(STATE.tsMode||'basic')==='basic'?'active':''}" onclick="STATE.tsMode='basic';renderTeam()">Basic</button><button class="${STATE.tsMode==='adv'?'active':''}" onclick="STATE.tsMode='adv';renderTeam()">Advanced</button></div>
        <span class="scopeflag">ranked ${STATE.profileScope==='all'?'across all competitions':'in '+L.meta.name}</span>
      </div>
      <div class="cardgrid smgrid">${STATE.tsMode==='adv'?advCards:cards}</div>
      <p class="hint" style="margin-top:8px">Tap any stat for the full ${L.teams.length}-team ranking \u00b7 badge = rank vs. the league${STATE.tsMode==='adv'?' \u00b7 ratings per 100 possessions':''}.</p>
    </div>
    <div class="twocol" style="margin-top:16px">
      <div class="panel"><h3>Standings \u00b7 ${L.meta.name}${t.group?" \u00b7 Group "+t.group:""}</h3>
        <div class="tablewrap stwrap"><table class="sttbl">
          <thead><tr><th class="rk">#</th><th class="l">TEAM</th><th>W</th><th>L</th><th title="Points for">PF</th><th title="Points against">PA</th><th>NET</th></tr></thead>
          <tbody>${strows}</tbody></table></div>
      </div>
      <div class="panel"><h3>Game log \u00b7 ${games.length} games</h3>
        ${games.length?`<div class="glogscroll tablewrap"><table class="glog">
          <thead><tr><th class="l">DATE</th><th class="l">OPPONENT</th><th class="l">W/L</th><th>SCORE</th></tr></thead>
          <tbody>${glrows}</tbody></table></div>`
        :`<p class="hint">No game data in this build \u2014 regenerate data.json with the updated build_all.py.</p>`}
      </div>
    </div>
    <div class="panel" style="margin-top:16px"><h3>Team shot chart</h3>
      <p class="hint" style="padding:20px 4px">Zone shot chart appears here once shot-location data is loaded (run <code>scraper_shots.py</code>, then <code>build_all.py</code>).</p>
    </div>
    <div class="panel" style="margin-top:16px" id="rosterPanel">
      <h3>Roster \u00b7 ${roster.length} players</h3>
      <div class="rostergrid">${roster.length?roster.map(p=>{const rec=recOf(p);
        return `<button class="pcard" data-id="${p.id}">
          <span class="pc-watch ${isWatched(p)?"on":""}" data-star="${p.id}" title="Watchlist">${isWatched(p)?"\u2605":"\u2606"}</span>
          <div class="pc-top">
            <div class="pc-ava">${p.img?`<img src="${p.img}" loading="lazy" onerror="this.style.display='none'"/>`:initials(p.name)}</div>
            <div class="pc-num">${p.jersey||'<span class="pc-tbd">#</span>'}</div>
            <div class="pc-id">
              <div class="pc-name">${p.name}</div>
              <div class="pc-meta">${p.pos&&p.pos!=="-"?p.pos:(p.role||"\u2013")}<span class="pc-dot">\u00b7</span>${p.height?(p.height/100).toFixed(2)+"m":"\u2013"}<span class="pc-dot">\u00b7</span>${p.born?"'"+String(p.born).slice(2):"\u2013"}</div>
            </div>
          </div>
          <div class="pc-stats">
            <div class="s"><div class="v">${fmt(p.ppg)}</div><div class="k">PPG</div></div>
            <div class="s"><div class="v">${fmt(p.rpg)}</div><div class="k">RPG</div></div>
            <div class="s"><div class="v">${fmt(p.apg)}</div><div class="k">APG</div></div>
            <div class="s"><div class="v">${fmt(p.pir)}</div><div class="k">PIR</div></div>
          </div>
        </button>`;}).join(""):'<p class="hint">No players matched to this team.</p>'}</div>
    </div>
  </div>`;
  $$("#app .pcard[data-id]").forEach(cd=>cd.onclick=e=>{
    if(e.target.dataset.star){e.stopPropagation();toggleWatch(e.target.dataset.star).then(renderTeam);return;}
    openProfile(cd.dataset.id);});
  $$("#app .statcard.clk[data-tk]").forEach(c=>c.onclick=()=>openTeamBoard(c.dataset.tk,c.dataset.tl,c.dataset.th==="1"));
  $$("#app .sttbl tr[data-tc]").forEach(tr=>tr.onclick=()=>openTeam(tr.dataset.tc));
}

/* ---------- Glossary ---------- */
function renderGlossary(){
  const guide=[
    ["Getting around","EuroScout covers nine competitions for the 2025\u201326 season \u2014 the two European cups (EuroLeague, EuroCup) plus seven domestic leagues: ABA (Adriatic), Liga ACB (Spain), Lega A (Italy), BBL (Germany), Betclic \u00c9lite (France), BNXT (Belgium/Netherlands) and SBL Herr (Sweden). The home <b>Players</b> board is your at-a-glance grid \u2014 every player as a card with a skill radar, star grade and tags, filterable down the left by league, position, tags and watchlist. Click any card for the full profile. The top tabs switch between this board, the <b>Stats</b> table, the <b>Teams</b> list, the <b>Exhibitions</b> board, the <b>Compare</b> tool and this <b>Glossary</b>. The search box up top jumps straight to any player, and any player profile has its own shareable link."],
    ["Competition scope (vs League / vs All)","The switch in the header controls what a player or team is <b>ranked against</b>. <b>vs League</b> ranks them among qualified players/teams in their own competition; <b>vs All</b> pools all nine competitions together \u2014 useful for asking \u201cwho is the best rebounder across everything?\u201d. It changes the rank badges everywhere, not the raw numbers."],
    ["The player card (side panel)","Clicking any player slides in a scouting card from the right while your list stays put behind it. Close it with \u2715, the Esc key, or by clicking outside. Inside the card the arrows \u2039 \u203a step through the current team\u2019s roster, and the dropdown jumps to any teammate \u2014 built for flipping between players during a live game. The header stays pinned as you scroll."],
    ["Scouting matchup","The <b>Scouting</b> tab lines up two teams side by side \u2014 pick the two clubs playing and their full rosters appear sorted by jersey number, so you can bounce between the two benches during a live game. Tap any player for the full card, or \u21c4 Swap to flip sides."],
    ["Scouting notes & ratings","Every player card has a star rating, a watchlist toggle, tags, and a structured report (Athleticism, Offense, Defense, Intel, Projection). Everything auto-saves in your browser. Notes are stored <b>per person</b>, so a note written on a player\u2019s EuroLeague card shows on his ABA card too."],
    ["One player, many competitions","A player who appears in more than one competition (or changed clubs mid-season) is merged into a single identity. His card shows a <b>Competitions</b> switch and a combined game log with a separator per competition. Linking is automatic (by ID and by name+birth-year); anything missed can be fixed by hand."],
    ["Editing & overrides","The \u270e Edit button on a card lets you correct bio details (height, weight, country, position, birth year), add an external profile link, or manually link two entries as the same person. Your edits save locally and can be exported as a file to make them permanent for everyone."],
    ["Team pages","Open a team for its roster (as cards), a full stat-card panel (Basic and Advanced, tap any card for the league ranking), the group standings, the season game log, and a placeholder for shot charts. Teams that play two competitions get the same Competitions switch as players."],
    ["Data & freshness","Numbers come from official sources: EuroLeague/EuroCup feeds and aba-liga.com box scores, reconciled game-by-game (every team\u2019s player points sum to the final score). \u201cLocal mode\u201d means your notes live in this browser only. The site is a single page \u2014 a fresh version loads when the data is updated."],
  ];
  const groups=[
    ["Box-score stats",[
      ["PPG / RPG / APG","Points, rebounds and assists per game."],
      ["SPG / BPG / TOPG","Steals, blocks and turnovers per game."],
      ["MIN / MPG","Minutes per game."],
      ["OREB / DREB","Offensive and defensive rebounds. (ABA game logs carry total rebounds only, so some ABA splits are unavailable.)"],
      ["FG% / 3P% / FT%","Field-goal, three-point and free-throw shooting percentages."],
      ["2P% / 3PA / FTA","Two-point %, three-point attempts, free-throw attempts (per game where shown)."],
      ["+/-","Point differential while the player was on the floor, per game."],
      ["GP / G","Games played."],
    ]],
    ["Advanced & efficiency",[
      ["eFG%","Effective field-goal % \u2014 credits a made three as 1.5\u00d7 a two: (FG + 0.5\u00d73P) / FGA."],
      ["TS%","True shooting % \u2014 points per shooting possession, including free throws: PTS / (2\u00d7(FGA + 0.44\u00d7FTA))."],
      ["USG%","Usage \u2014 share of team possessions a player finishes: (FGA + 0.44\u00d7FTA + TOV) relative to the team. How much offense he shoulders."],
      ["A/TO","Assist-to-turnover ratio \u2014 playmaking economy."],
      ["PER-40 (PTS/40\u2026)","Any stat projected to 40 minutes, so bench and starter production can be compared on equal footing."],
      ["PIR","Performance Index Rating \u2014 EuroLeague\u2019s official all-round valuation, taken from the box score and averaged per game."],
      ["FTr","Free-throw rate \u2014 how often a player gets to the line relative to shot attempts (FTA / FGA)."],
    ]],
    ["Team stats",[
      ["PPG FOR / PPG VS","Points a team scores / allows per game."],
      ["NET / GM","Average scoring margin per game (points for minus against)."],
      ["PACE","Estimated possessions per game \u2014 how fast a team plays. (Estimated without offensive rebounds, consistent across teams.)"],
      ["ORTG / DRTG","Offensive / defensive rating \u2014 points scored / allowed per 100 possessions."],
      ["AST% / TOV%","Share of made baskets that are assisted / share of possessions ending in a turnover."],
      ["3PA RATE / FT RATE","How three-point-happy a team is, and how often it reaches the line, relative to its shots."],
      ["REB DIFF","Rebounding margin vs opponents per game."],
      ["OPP FG% / OPP 3P% / OPP eFG%","What a team lets opponents shoot \u2014 defensive shooting quality."],
      ["PF / PA","Points For / Points Against (season totals, shown in standings)."],
    ]],
    ["Ranking & comparison",[
      ["Percentile","Where a player ranks among qualified players. 90th percentile = better than 90% of peers. The colored bars on a card show this at a glance."],
      ["Rank badge (e.g. 4th/237)","Place out of the qualified pool, in the current scope (vs League or vs All). Green = elite, gold = solid, clay = below the pack."],
      ["Qualified","Players meeting the minutes/games minimum \u2014 the baseline for percentiles and leaderboards, so garbage-time lines don\u2019t skew the ranks."],
      ["Z-score","How many standard deviations above/below average \u2014 the basis for fair cross-competition comparison."],
      ["Shrinkage","Small-sample rates (e.g. a 3-game 60% from three) are pulled toward the average so tiny samples don\u2019t top leaderboards."],
    ]],
    ["Roster & identity",[
      ["Jersey #","Squad number, shown before the name and used to sort rosters (#0 first). Most ABA youth players have no assigned number and appear last."],
      ["2 clubs / 2TM","Player suited up for two teams; his totals are combined into one entry."],
      ["Competitions switch","Appears on players/teams active in more than one competition \u2014 switch the view between them; the game log can show them all with separators."],
      ["Group (A / B)","EuroCup is split into groups; standings on a team page show only that team\u2019s own group."],
    ]],
  ];
  const guideHTML=guide.map(([t,d])=>`<div class="gcard"><h4>${t}</h4><p>${d}</p></div>`).join("");
  const fr=freshnessRows();
  const freshHTML=`<div class="panel" style="margin-top:14px"><h3>Data freshness</h3>
    <div class="sub" style="margin-bottom:10px">Data last built <b>${freshLabel(dataBuildDate())}</b>${dataBuildDate()?` (${dataBuildDate()})`:""}. Each league below shows its most recent game in the dataset.</div>
    <div class="freshgrid">${fr.map(r=>`<div class="freshrow"><span class="freshdot ${daysAgo(r.last)!=null&&daysAgo(r.last)<45?'ok':'old'}"></span><span class="freshlg">${r.name}</span><span class="freshval">${r.label}</span><span class="freshdate">${r.last||"—"}</span></div>`).join("")}</div>
  </div>`;
  const groupsHTML=groups.map(([title,items])=>`
    <div class="panel" style="margin-top:14px">
      <h3>${title}</h3>
      <dl class="gloss">${items.map(([t,d])=>`<dt>${t}</dt><dd>${d}</dd>`).join("")}</dl>
    </div>`).join("");
  $("#app").innerHTML=`<div class="view">
    <h1 class="title">Glossary &amp; guide</h1>
    <div class="sub">How EuroScout works, and what every number means.</div>
    <div class="panel"><h3>How it works</h3><div class="gguide">${guideHTML}</div></div>
    ${freshHTML}
    ${groupsHTML}
    <p class="hint" style="margin:14px 2px 0">EuroScout is a scouting tool, not an official source \u2014 always sanity-check against live viewing. Stats reflect the 2025\u201326 season as last built.</p>
  </div>`;
}


/* ---------- modal ---------- */
function showPhoto(src,name){let m=$("#modal");
  if(!m){m=document.createElement("div");m.id="modal";m.className="modal";document.body.appendChild(m);}
  m.innerHTML='<div class="photobox"><button class="close" onclick="hideModal()">\u2715</button><img src="'+src+'" alt=""/><div class="photoname">'+name+'</div></div>';
  m.onclick=e=>{if(e.target===m)hideModal();};}
function showModal(html,wide){let m=$("#modal");if(!m){m=document.createElement("div");m.id="modal";m.className="modal";
  document.body.appendChild(m);}m.innerHTML=`<div class="modalbox${wide?' wide':''}" style="position:relative">
    <button class="close" onclick="hideModal()">✕</button>${html}</div>`;
  m.onclick=e=>{if(e.target===m)hideModal();};}
function hideModal(){const m=$("#modal");if(m)m.remove();}

// expose for inline event handlers (which run in global scope)
Object.assign(window,{STATE,render,hideModal,openProfile,closeDrawer,drawerJump,setScopeMode,switchComp,openTeam,openTeamIn,openTeamRoster,setScope,glToggle,wireProfileNav,openGlobal,openLeaguePlayers,openEditModal,showPhoto,toggleTheme,openAgentRoster,openAgencyRoster,$,$$});

boot();
</script>
