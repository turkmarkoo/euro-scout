/* ---------- team identity across competitions + aggregated team stats ---------- */
const DEFAULT_TEAM_LINKS=[["euroleague:RED","aba:CZV"],["eurocup:LJU","aba:COL"],["euroleague:MAD","acb:RMB"],["euroleague:PAM","acb:VBC"],["euroleague:BAS","acb:BKN"],["euroleague:MIL","lba:MIO"],["euroleague:VIR","lba:BOV"],["eurocup:TRN","lba:TN"],["eurocup:VNC","lba:VE"]];
function teamKey(lid,code){return lid+":"+code;}
function teamGroup(lid,code){
  const links=[...DEFAULT_TEAM_LINKS,...(OVR.teamLinks||[])];
  const found=new Set([teamKey(lid,code)]);
  // same code in other leagues links automatically (DUB, PAR, BUD, CLU...)
  STATE.data.leagues.forEach(L=>{if(L.meta.id!==lid&&L.teams.some(t=>t.code===code))found.add(teamKey(L.meta.id,code));});
  let grew=true;
  while(grew){grew=false;
    links.forEach(([a,b])=>{
      if(found.has(a)&&!found.has(b)){found.add(b);grew=true;}
      if(found.has(b)&&!found.has(a)){found.add(a);grew=true;}});}
  const out=[];
  found.forEach(k=>{const[l,c]=k.split(":");const L=STATE.data.leagues.find(x=>x.meta.id===l);
    const t=L&&L.teams.find(x=>x.code===c);if(t)out.push({league:l,code:c,team:t,L});});
  out.sort((a,b)=>STATE.data.leagues.findIndex(x=>x.meta.id===a.league)-STATE.data.leagues.findIndex(x=>x.meta.id===b.league));
  return out;
}
function teamScopeAll(){return STATE.profileScope==="all";}
function teamAgg(L){
  STATE._tagg=STATE._tagg||{};
  if(STATE._tagg[L.meta.id])return STATE._tagg[L.meta.id];
  const side={};(L.games||[]).forEach(g=>{side[g.date+"|"+g.a+"|H"]=g.h;side[g.date+"|"+g.h+"|A"]=g.a;});
  const T={},OP={};
  const mk=()=>({fgm:0,fga:0,f3m:0,f3a:0,ftm:0,fta:0,reb:0,ast:0,stl:0,blk:0,tov:0,pir:0,pts:0});
  L.players.forEach(p=>(p.gameLog||[]).forEach(r=>{
    const tc=side[r[0]+"|"+r[1]+"|"+r[2]];if(!tc)return;
    const opp=r[1];
    const o=T[tc]=T[tc]||mk(); const q=OP[opp]=OP[opp]||mk();
    [o,q].forEach(x=>{x.fgm+=r[8];x.fga+=r[9];x.f3m+=r[10];x.f3a+=r[11];x.ftm+=r[12];x.fta+=r[13];
      x.reb+=r[14];x.ast+=r[15];x.stl+=r[16];x.blk+=r[17];x.tov+=r[18];x.pir+=r[19];x.pts+=r[7];});}));
  const played={};(L.games||[]).forEach(g=>{
    [[g.h,g.hs,g.as],[g.a,g.as,g.hs]].forEach(([c,pf,pa])=>{
      const o=played[c]=played[c]||{gp:0,pf:0,pa:0};o.gp++;o.pf+=pf;o.pa+=pa;});});
  const out={};
  L.teams.forEach(t=>{const a=T[t.code],q=OP[t.code],pl=played[t.code];
    const g=Math.max(1,pl?pl.gp:(t.w+t.l));
    const base=pl?{ppg:pl.pf/g,oppg:pl.pa/g,net:(pl.pf-pl.pa)/g}:{ppg:t.ppg,oppg:t.oppg,net:t.net};
    if(!a){out[t.code]=base;return;}
    const f2m=a.fgm-a.f3m,f2a=a.fga-a.f3a;
    const poss=a.fga+0.44*a.fta+a.tov, opPoss=q?(q.fga+0.44*q.fta+q.tov):0;
    out[t.code]={...base,
      rpg:a.reb/g,apg:a.ast/g,spg:a.stl/g,bpg:a.blk/g,tpg:a.tov/g,pirg:a.pir/g,
      fgp:a.fga?a.fgm/a.fga*100:0,f2p:f2a?f2m/f2a*100:0,f3p:a.f3a?a.f3m/a.f3a*100:0,ftp:a.fta?a.ftm/a.fta*100:0,
      f3apg:a.f3a/g,ftapg:a.fta/g,astto:a.tov?a.ast/a.tov:a.ast,
      pace:poss/g,ortg:poss?a.pts/poss*100:0,drtg:(q&&opPoss)?q.pts/opPoss*100:0,
      efg:a.fga?(a.fgm+0.5*a.f3m)/a.fga*100:0,ts:a.pts/(2*(a.fga+0.44*a.fta))*100,
      astpct:a.fgm?a.ast/a.fgm*100:0,tovpct:poss?a.tov/poss*100:0,
      f3ar:a.fga?a.f3a/a.fga*100:0,ftr:a.fga?a.fta/a.fga*100:0,
      orebdiff:q?(a.reb-q.reb)/g:0,
      oppfgp:(q&&q.fga)?q.fgm/q.fga*100:0,oppf3p:(q&&q.f3a)?q.f3m/q.f3a*100:0,oppefg:(q&&q.fga)?(q.fgm+0.5*q.f3m)/q.fga*100:0};});
  STATE._tagg[L.meta.id]=out;return out;
}
const TEAM_CARDS=[["ppg","PPG FOR",1],["oppg","PPG VS",0],["net","NET / GM",1],["rpg","REB",1],
  ["apg","AST",1],["spg","STL",1],["bpg","BLK",1],["tpg","TOV",0],["pirg","PIR",1],
  ["fgp","FG%",1],["f2p","2P%",1],["f3p","3P%",1],["ftp","FT%",1],["f3apg","3PA/G",1],["ftapg","FTA/G",1],["astto","A/TO",1]];
const TEAM_CARDS_ADV=[["pace","PACE",1],["ortg","ORTG",1],["drtg","DRTG",0],["efg","eFG%",1],["ts","TS%",1],
  ["astpct","AST%",1],["tovpct","TOV%",0],["f3ar","3PA RATE",1],["ftr","FT RATE",1],
  ["orebdiff","REB DIFF",1],["oppfgp","OPP FG%",0],["oppf3p","OPP 3P%",0],["oppefg","OPP eFG%",0]];
function teamRank(L,code,k,hi){
  let vals;
  if(teamScopeAll()){
    vals=[];STATE.data.leagues.forEach(Lx=>{const ax=teamAgg(Lx);Lx.teams.forEach(t=>{const v=ax[t.code]?ax[t.code][k]:null;if(v!=null&&!isNaN(v))vals.push({c:Lx.meta.id+":"+t.code,v});});});
    vals.sort((a,b)=>hi?b.v-a.v:a.v-b.v);
    const i=vals.findIndex(x=>x.c===L.meta.id+":"+code);
    return {rank:i+1,n:vals.length};
  }
  const agg=teamAgg(L);
  vals=L.teams.map(t=>({c:t.code,v:agg[t.code]?agg[t.code][k]:null})).filter(x=>x.v!=null&&!isNaN(x.v));
  vals.sort((a,b)=>hi?b.v-a.v:a.v-b.v);
  const i=vals.findIndex(x=>x.c===code);
  return {rank:i+1,n:vals.length};
}
function ordinal(n){const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function tRankColor(rank,n){const pct=n>1?(n-rank)/(n-1)*100:50;
  return pct>=67?"var(--good)":pct>=34?"#C99A3C":"var(--accent-deep)";}
function openTeamBoard(k,label,hi){
  const all=teamScopeAll();
  let rows=[];
  if(all){STATE.data.leagues.forEach(Lx=>{const ax=teamAgg(Lx);Lx.teams.forEach(t=>{const v=ax[t.code]?ax[t.code][k]:null;if(v!=null&&!isNaN(v))rows.push({t,lg:Lx.meta.id,lgn:Lx.meta.name,v});});});}
  else{const L=STATE.league,agg=teamAgg(L);rows=L.teams.map(t=>({t,lg:L.meta.id,lgn:L.meta.name,v:agg[t.code]?agg[t.code][k]:null})).filter(x=>x.v!=null&&!isNaN(x.v));}
  rows.sort((a,b)=>hi?b.v-a.v:a.v-b.v);
  const LGB={euroleague:"EL",eurocup:"EC",aba:"ABA",acb:"ACB",lba:"LBA"};
  showModal('<h3>'+label+' \u2014 '+(all?"all competitions":STATE.league.meta.name)+'</h3><div class="lbwrap"><table class="lbtable"><tbody>'+
    rows.map((r,i)=>'<tr class="'+(r.t.code===CURRENT_TEAM&&r.lg===STATE.league.meta.id?"me":"")+'" data-tc="'+r.t.code+'" data-lg="'+r.lg+'"><td class="rk">'+(i+1)+'</td><td class="l">'+r.t.name+(all?' <span class="badge">'+(LGB[r.lg]||r.lg)+'</span>':'')+'</td><td class="v">'+((k==="net"||k==="orebdiff")&&r.v>0?"+":"")+fmt(r.v)+'</td></tr>').join("")+
    '</tbody></table></div>');
  $$("#modal tr[data-tc]").forEach(tr=>tr.onclick=()=>{hideModal();openTeamIn(tr.dataset.lg,tr.dataset.tc);});
  const me=$("#modal tr.me");if(me)me.scrollIntoView({block:"center"});
}
function renderTeams(){
  const all=STATE.allLeagues;
  const q=normName(STATE.teamQ||"");
  const pool=all?allTeamsFlat():STATE.league.teams.map(t=>({...t,_lid:STATE.league.meta.id}));
  let teams=pool.slice().sort((a,b)=>all?(STATE.data.leagues.findIndex(x=>x.meta.id===a._lid)-STATE.data.leagues.findIndex(x=>x.meta.id===b._lid))||a.rank-b.rank:((a.group||"").localeCompare(b.group||"")||a.rank-b.rank));
  if(q)teams=teams.filter(t=>normName(t.name).includes(q)||normName(t.city||"").includes(q)||normName(t.country||"").includes(q));
  const LGB={euroleague:"EL",eurocup:"EC",aba:"ABA",acb:"ACB",lba:"LBA"};
  $("#app").innerHTML=`<div class="view">
    <h1 class="title">${all?"All teams":STATE.league.meta.name+" teams"}</h1>
    <div class="sub">${all?`Every club across <b>${STATE.data.leagues.length}</b> competitions \u00b7 use the chips to narrow`:`Regular season standings \u00b7 ${STATE.league.meta.season}`}</div>
    ${scopeChips()}
    <div class="controls"><input type="text" id="teamSearch" placeholder="Search teams\u2026" value="${STATE.teamQ||""}" style="min-width:220px"/>
      ${STATE.teamQ?`<span class="hint">${teams.length} match${teams.length===1?"":"es"}</span>`:""}</div>
    <div class="tablewrap"><table>
      <thead><tr>${all?"":'<th class="l">#</th>'}<th class="l">TEAM</th>${all?'<th class="l">LG</th>':''}<th class="l">COUNTRY</th>
        <th>W</th><th>L</th><th>WIN%</th><th>PPG</th><th>OPP PPG</th><th>NET</th><th>ROSTER</th></tr></thead>
      <tbody>${teams.length?teams.map(t=>`<tr class="clickteam" data-team="${t.code}" data-lg="${t._lid}">${all?"":`<td class="l" style="color:var(--muted)">${t.group?t.group+t.rank:t.rank}</td>`}
        <td class="l"><span class="pname">${t.name}</span> <span class="pteam">${t.city}</span></td>
        ${all?`<td class="l"><span class="badge">${LGB[t._lid]||t._lid}</span></td>`:''}
        <td class="l pteam">${t.country}</td><td>${t.w}</td><td>${t.l}</td><td>${fmt(t.winPct)}</td>
        <td>${fmt(t.ppg)}</td><td>${fmt(t.oppg)}</td>
        <td style="color:${t.net>0?"var(--good)":"var(--bad)"}">${t.net>0?"+":""}${fmt(t.net)}</td>
        <td>${t.rosterCount}</td></tr>`).join(""):`<tr><td colspan="11" class="l" style="padding:16px;color:var(--muted)">No teams match “${STATE.teamQ}”.</td></tr>`}
      </tbody></table></div>
    <p class="hint" style="margin-top:10px">Click a team for its roster, stats, standings and game log.</p>
  </div>`;
  const ts=$("#teamSearch");
  if(ts){ts.oninput=()=>{STATE.teamQ=ts.value;const pos=ts.selectionStart;renderTeams();const el=$("#teamSearch");if(el){el.focus();try{el.setSelectionRange(pos,pos);}catch(e){}}};}
  $$("#app tbody tr.clickteam").forEach(tr=>tr.onclick=()=>openTeamIn(tr.dataset.lg,tr.dataset.team));
}

/* ---------- Team page ---------- */
let CURRENT_TEAM=null;
function openTeam(code){CURRENT_TEAM=code;STATE.view="team";
  $$("#tabs button").forEach(x=>x.classList.remove("active"));renderTeam();}
function renderTeam(){
  const L=STATE.league, t=L.teams.find(x=>x.code===CURRENT_TEAM);
  if(!t){STATE.view="teams";render();return;}
  const jn=p=>{const v=(p.jersey===0||p.jersey==="0")?0:parseInt(p.jersey);return isNaN(v)?999:v;};
  const roster=L.players.filter(p=>p.team===t.code).sort((a,b)=>jn(a)-jn(b)||b.ppg-a.ppg);
  const grp=teamGroup(L.meta.id,t.code);
  const agg=teamAgg(L)[t.code]||{};
  const mkCards=list=>list.map(([k,lab,hi])=>{
    const v=agg[k];if(v==null||isNaN(v))return "";
    const r=teamRank(L,t.code,k,hi);
    const rstyle=`color:${tRankColor(r.rank,r.n)};background:color-mix(in srgb,${tRankColor(r.rank,r.n)} 15%,var(--panel));border:1px solid color-mix(in srgb,${tRankColor(r.rank,r.n)} 30%,var(--line))`;
    return `<div class="statcard clk" data-tk="${k}" data-tl="${lab}" data-th="${hi}" title="Tap for the ${lab} team ranking">
      <div class="sc-v">${(k==="net"||k==="orebdiff")&&v>0?"+":""}${fmt(v)}${lab.includes("%")&&!lab.includes("RATE")?"%":""}</div>
      <div class="sc-k">${lab}</div>
      <div class="sc-rank" style="${rstyle}">${ordinal(r.rank)}/${r.n}</div>
    </div>`;}).join("");
  const cards=mkCards(TEAM_CARDS), advCards=mkCards(TEAM_CARDS_ADV);
  const games=(L.games||[]).filter(g=>g.h===t.code||g.a===t.code).sort((a,b)=>a.date.localeCompare(b.date));
  const glrows=games.map(g=>{
    const home=g.h===t.code, opp=home?g.a:g.h, ts=home?g.hs:g.as, os=home?g.as:g.hs, win=ts>os;
    const on=(L.teams.find(x=>x.code===opp)||{}).name||opp;
    return `<tr><td class="l" style="color:var(--muted);white-space:nowrap">${fullDate(g.date)}</td>
      <td class="l">${home?"vs ":"@ "}<span class="tlink" onclick="openTeamIn('${L.meta.id}','${opp}')">${on}</span></td>
      <td class="l" style="color:${win?"var(--good)":"var(--bad)"};font-weight:700">${win?"W":"L"}</td>
      <td style="font-family:var(--mono)">${ts}\u2013${os}</td></tr>`;}).join("");
  const myGroup=t.group||"";
  const stTeams=L.teams.filter(x=>(x.group||"")===myGroup).sort((a,b)=>a.rank-b.rank);
  let strows="";
  if(myGroup)strows+=`<tr class="stgrouprow"><td colspan="8">Group ${myGroup}</td></tr>`;
  stTeams.forEach(x=>{
    strows+=`<tr class="${x.code===t.code?"me":""}" data-tc="${x.code}">
      <td class="rk">${x.rank}</td><td class="l">${x.name}</td>
      <td>${x.w}</td><td>${x.l}</td><td class="pfpa">${x.pf!=null?x.pf:"–"}</td><td class="pfpa">${x.pa!=null?x.pa:"–"}</td>
      <td style="color:${x.net>0?"var(--good)":x.net<0?"var(--bad)":"var(--muted)"}">${x.net>0?"+":""}${fmt(x.net)}</td></tr>`;});
  $("#app").innerHTML=`<div class="view">
    <button class="backlink" onclick="STATE.view='teams';render()">\u2190 Back to teams</button>
    <div class="panel">
      <div class="teamhead">
        <div class="teamcrest">${t.code}</div>
        <div style="flex:1;min-width:220px">
          <div class="phname"><h1>${t.name}</h1></div>
          <div class="phclub">
            <span class="tlink" onclick="setScope('${L.meta.id}');STATE.view='players';render()">${L.meta.name} ${L.meta.season}</span>
            <span class="phsep">\u00b7</span><span>${t.city}, ${t.country}</span>
            ${t.group?`<span class="phsep">\u00b7</span><span>Group ${t.group}</span>`:""}
          </div>
          ${grp.length>1?`<div class="comptabs" style="margin-top:8px"><span class="hint" style="align-self:center;margin-right:2px">Competitions:</span>${grp.map(x=>`<button class="comptab ${x.league===L.meta.id&&x.code===t.code?"active":""}" onclick="openTeamIn('${x.league}','${x.code}')" title="${x.L.meta.name} \u00b7 ${x.team.name}">${x.L.meta.name}</button>`).join("")}</div>`:""}
        </div>
        <div class="statline">
          <div class="s"><div class="v">${t.w}-${t.l}</div><div class="k">Record</div></div>
          <div class="s"><div class="v">${fmt(t.winPct)}</div><div class="k">Win%</div></div>
          <div class="s"><div class="v">${t.group?t.group+t.rank:t.rank}</div><div class="k">Rank</div></div>
        </div>
      </div>
    </div>
    <div class="panel" style="margin-top:16px">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px">
        <h3 style="margin:0">Team averages \u00b7 ${L.meta.name}</h3>
        <div class="seg"><button class="${(STATE.tsMode||'basic')==='basic'?'active':''}" onclick="STATE.tsMode='basic';renderTeam()">Basic</button><button class="${STATE.tsMode==='adv'?'active':''}" onclick="STATE.tsMode='adv';renderTeam()">Advanced</button></div>
        <span class="scopeflag">ranked ${STATE.profileScope==='all'?'across all competitions':'in '+L.meta.name}</span>
      </div>
      <div class="cardgrid smgrid">${STATE.tsMode==='adv'?advCards:cards}</div>
      <p class="hint" style="margin-top:8px">Tap any stat for the full ${L.teams.length}-team ranking \u00b7 badge = rank vs. the league${STATE.tsMode==='adv'?' \u00b7 ratings per 100 possessions':''}.</p>
    </div>
    <div class="twocol" style="margin-top:16px">
      <div class="panel"><h3>Standings \u00b7 ${L.meta.name}${t.group?" \u00b7 Group "+t.group:""}</h3>
        <div class="tablewrap stwrap"><table class="sttbl">
          <thead><tr><th class="rk">#</th><th class="l">TEAM</th><th>W</th><th>L</th><th title="Points for">PF</th><th title="Points against">PA</th><th>NET</th></tr></thead>
          <tbody>${strows}</tbody></table></div>
      </div>
      <div class="panel"><h3>Game log \u00b7 ${games.length} games</h3>
        ${games.length?`<div class="glogscroll tablewrap"><table class="glog">
          <thead><tr><th class="l">DATE</th><th class="l">OPPONENT</th><th class="l">W/L</th><th>SCORE</th></tr></thead>
          <tbody>${glrows}</tbody></table></div>`
        :`<p class="hint">No game data in this build \u2014 regenerate data.json with the updated build_all.py.</p>`}
      </div>
    </div>
    <div class="panel" style="margin-top:16px"><h3>Team shot chart</h3>
      <p class="hint" style="padding:20px 4px">Zone shot chart appears here once shot-location data is loaded (run <code>scraper_shots.py</code>, then <code>build_all.py</code>).</p>
    </div>
    <div class="panel" style="margin-top:16px" id="rosterPanel">
      <h3>Roster \u00b7 ${roster.length} players</h3>
      <div class="rostergrid">${roster.length?roster.map(p=>{const rec=recOf(p);
        return `<button class="pcard" data-id="${p.id}">
          <span class="pc-watch ${rec.watch?"on":""}" data-star="${p.id}" title="Watchlist">${rec.watch?"\u2605":"\u2606"}</span>
          <div class="pc-top">
            <div class="pc-ava">${p.img?`<img src="${p.img}" loading="lazy" onerror="this.style.display='none'"/>`:initials(p.name)}</div>
            <div class="pc-num">${p.jersey||'<span class="pc-tbd">#</span>'}</div>
            <div class="pc-id">
              <div class="pc-name">${p.name}</div>
              <div class="pc-meta">${p.pos&&p.pos!=="-"?p.pos:(p.role||"\u2013")}<span class="pc-dot">\u00b7</span>${p.height?(p.height/100).toFixed(2)+"m":"\u2013"}<span class="pc-dot">\u00b7</span>${p.born?"'"+String(p.born).slice(2):"\u2013"}</div>
            </div>
          </div>
          <div class="pc-stats">
            <div class="s"><div class="v">${fmt(p.ppg)}</div><div class="k">PPG</div></div>
            <div class="s"><div class="v">${fmt(p.rpg)}</div><div class="k">RPG</div></div>
            <div class="s"><div class="v">${fmt(p.apg)}</div><div class="k">APG</div></div>
            <div class="s"><div class="v">${fmt(p.pir)}</div><div class="k">PIR</div></div>
          </div>
        </button>`;}).join(""):'<p class="hint">No players matched to this team.</p>'}</div>
    </div>
  </div>`;
  $$("#app .pcard[data-id]").forEach(cd=>cd.onclick=e=>{
    if(e.target.dataset.star){e.stopPropagation();toggleWatch(e.target.dataset.star).then(renderTeam);return;}
    openProfile(cd.dataset.id);});
  $$("#app .statcard.clk[data-tk]").forEach(c=>c.onclick=()=>openTeamBoard(c.dataset.tk,c.dataset.tl,c.dataset.th==="1"));
  $$("#app .sttbl tr[data-tc]").forEach(tr=>tr.onclick=()=>openTeam(tr.dataset.tc));
}

/* ---------- Glossary ---------- */
function renderGlossary(){
  const guide=[
    ["Getting around","EuroScout covers three competitions \u2014 EuroLeague, EuroCup and the ABA (Adriatic) League \u2014 for the 2025\u201326 season. The top tabs switch between the <b>Players</b> table, the <b>Teams</b> list, your <b>Watchlist</b>, the <b>Compare</b> tool and this <b>Glossary</b>. The search box up top jumps straight to any player."],
    ["Competition scope (vs League / vs All)","The switch in the header controls what a player or team is <b>ranked against</b>. <b>vs League</b> ranks them among qualified players/teams in their own competition; <b>vs All</b> pools all three competitions together \u2014 useful for asking \u201cwho is the best rebounder across everything?\u201d. It changes the rank badges everywhere, not the raw numbers."],
    ["The player card (side panel)","Clicking any player slides in a scouting card from the right while your list stays put behind it. Close it with \u2715, the Esc key, or by clicking outside. Inside the card the arrows \u2039 \u203a step through the current team\u2019s roster, and the dropdown jumps to any teammate \u2014 built for flipping between players during a live game. The header stays pinned as you scroll."],
    ["Matchup (live scouting)","In the header\u2019s second row, pick the two teams playing each other. Two quick pills appear \u2014 tap either to jump straight to that team\u2019s roster, so you can bounce between the two benches in one click while watching a game."],
    ["Scouting notes & ratings","Every player card has a star rating, a watchlist toggle, tags, and a structured report (Athleticism, Offense, Defense, Intel, Projection). Everything auto-saves in your browser. Notes are stored <b>per person</b>, so a note written on a player\u2019s EuroLeague card shows on his ABA card too."],
    ["One player, many competitions","A player who appears in more than one competition (or changed clubs mid-season) is merged into a single identity. His card shows a <b>Competitions</b> switch and a combined game log with a separator per competition. Linking is automatic (by ID and by name+birth-year); anything missed can be fixed by hand."],
    ["Editing & overrides","The \u270e Edit button on a card lets you correct bio details (height, weight, country, position, birth year), add an external profile link, or manually link two entries as the same person. Your edits save locally and can be exported as a file to make them permanent for everyone."],
    ["Team pages","Open a team for its roster (as cards), a full stat-card panel (Basic and Advanced, tap any card for the league ranking), the group standings, the season game log, and a placeholder for shot charts. Teams that play two competitions get the same Competitions switch as players."],
    ["Data & freshness","Numbers come from official sources: EuroLeague/EuroCup feeds and aba-liga.com box scores, reconciled game-by-game (every team\u2019s player points sum to the final score). \u201cLocal mode\u201d means your notes live in this browser only. The site is a single page \u2014 a fresh version loads when the data is updated."],
  ];
  const groups=[
    ["Box-score stats",[
      ["PPG / RPG / APG","Points, rebounds and assists per game."],
      ["SPG / BPG / TOPG","Steals, blocks and turnovers per game."],
      ["MIN / MPG","Minutes per game."],
      ["OREB / DREB","Offensive and defensive rebounds. (ABA game logs carry total rebounds only, so some ABA splits are unavailable.)"],
      ["FG% / 3P% / FT%","Field-goal, three-point and free-throw shooting percentages."],
      ["2P% / 3PA / FTA","Two-point %, three-point attempts, free-throw attempts (per game where shown)."],
      ["+/-","Point differential while the player was on the floor, per game."],
      ["GP / G","Games played."],
    ]],
    ["Advanced & efficiency",[
      ["eFG%","Effective field-goal % \u2014 credits a made three as 1.5\u00d7 a two: (FG + 0.5\u00d73P) / FGA."],
      ["TS%","True shooting % \u2014 points per shooting possession, including free throws: PTS / (2\u00d7(FGA + 0.44\u00d7FTA))."],
      ["USG%","Usage \u2014 share of team possessions a player finishes: (FGA + 0.44\u00d7FTA + TOV) relative to the team. How much offense he shoulders."],
      ["A/TO","Assist-to-turnover ratio \u2014 playmaking economy."],
      ["PER-40 (PTS/40\u2026)","Any stat projected to 40 minutes, so bench and starter production can be compared on equal footing."],
      ["PIR","Performance Index Rating \u2014 EuroLeague\u2019s official all-round valuation, taken from the box score and averaged per game."],
      ["FTr","Free-throw rate \u2014 how often a player gets to the line relative to shot attempts (FTA / FGA)."],
    ]],
    ["Team stats",[
      ["PPG FOR / PPG VS","Points a team scores / allows per game."],
      ["NET / GM","Average scoring margin per game (points for minus against)."],
      ["PACE","Estimated possessions per game \u2014 how fast a team plays. (Estimated without offensive rebounds, consistent across teams.)"],
      ["ORTG / DRTG","Offensive / defensive rating \u2014 points scored / allowed per 100 possessions."],
      ["AST% / TOV%","Share of made baskets that are assisted / share of possessions ending in a turnover."],
      ["3PA RATE / FT RATE","How three-point-happy a team is, and how often it reaches the line, relative to its shots."],
      ["REB DIFF","Rebounding margin vs opponents per game."],
      ["OPP FG% / OPP 3P% / OPP eFG%","What a team lets opponents shoot \u2014 defensive shooting quality."],
      ["PF / PA","Points For / Points Against (season totals, shown in standings)."],
    ]],
    ["Ranking & comparison",[
      ["Percentile","Where a player ranks among qualified players. 90th percentile = better than 90% of peers. The colored bars on a card show this at a glance."],
      ["Rank badge (e.g. 4th/237)","Place out of the qualified pool, in the current scope (vs League or vs All). Green = elite, gold = solid, clay = below the pack."],
      ["Qualified","Players meeting the minutes/games minimum \u2014 the baseline for percentiles and leaderboards, so garbage-time lines don\u2019t skew the ranks."],
      ["Z-score","How many standard deviations above/below average \u2014 the basis for fair cross-competition comparison."],
      ["Shrinkage","Small-sample rates (e.g. a 3-game 60% from three) are pulled toward the average so tiny samples don\u2019t top leaderboards."],
    ]],
    ["Roster & identity",[
      ["Jersey #","Squad number, shown before the name and used to sort rosters (#0 first). Most ABA youth players have no assigned number and appear last."],
      ["2 clubs / 2TM","Player suited up for two teams; his totals are combined into one entry."],
      ["Competitions switch","Appears on players/teams active in more than one competition \u2014 switch the view between them; the game log can show them all with separators."],
      ["Group (A / B)","EuroCup is split into groups; standings on a team page show only that team\u2019s own group."],
    ]],
  ];
  const guideHTML=guide.map(([t,d])=>`<div class="gcard"><h4>${t}</h4><p>${d}</p></div>`).join("");
  const groupsHTML=groups.map(([title,items])=>`
    <div class="panel" style="margin-top:14px">
      <h3>${title}</h3>
      <dl class="gloss">${items.map(([t,d])=>`<dt>${t}</dt><dd>${d}</dd>`).join("")}</dl>
    </div>`).join("");
  $("#app").innerHTML=`<div class="view">
    <h1 class="title">Glossary &amp; guide</h1>
    <div class="sub">How EuroScout works, and what every number means.</div>
    <div class="panel"><h3>How it works</h3><div class="gguide">${guideHTML}</div></div>
    ${groupsHTML}
    <p class="hint" style="margin:14px 2px 0">EuroScout is a scouting tool, not an official source \u2014 always sanity-check against live viewing. Stats reflect the 2025\u201326 season as last built.</p>
  </div>`;
}


/* ---------- modal ---------- */
function showPhoto(src,name){let m=$("#modal");
  if(!m){m=document.createElement("div");m.id="modal";m.className="modal";document.body.appendChild(m);}
  m.innerHTML='<div class="photobox"><button class="close" onclick="hideModal()">\u2715</button><img src="'+src+'" alt=""/><div class="photoname">'+name+'</div></div>';
  m.onclick=e=>{if(e.target===m)hideModal();};}
function showModal(html,wide){let m=$("#modal");if(!m){m=document.createElement("div");m.id="modal";m.className="modal";
  document.body.appendChild(m);}m.innerHTML=`<div class="modalbox${wide?' wide':''}" style="position:relative">
    <button class="close" onclick="hideModal()">✕</button>${html}</div>`;
  m.onclick=e=>{if(e.target===m)hideModal();};}
function hideModal(){const m=$("#modal");if(m)m.remove();}

// expose for inline event handlers (which run in global scope)
Object.assign(window,{STATE,render,hideModal,openProfile,closeDrawer,drawerJump,switchComp,openTeam,openTeamIn,openTeamRoster,setScope,glToggle,wireProfileNav,openGlobal,openLeaguePlayers,openEditModal,showPhoto,toggleTheme,$,$$});

boot();
